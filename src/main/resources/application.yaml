spring:
  application:
    name: pigeonSkyRace

  data:
    mongodb:
      # Override with MONGODB_URI (e.g. mongodb://user:pass@mongodb:27017/pigeonSkyRace?authSource=admin in Docker)
      uri: ${MONGODB_URI:mongodb://admin:admin@localhost:27017/pigeonSkyRace?authSource=admin}

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: UTC

logging:
  level:
    root: INFO
    com.pigeonskyrace: INFO

server:
  port: ${SERVER_PORT:8082}
