spring:
  application:
    name: pigeonSkyRace

  data:
    mongodb:
      # Override with MONGODB_URI (e.g. mongodb://user:pass@mongodb:27017/pigeonSkyRace?authSource=admin in Docker)
      uri: ${MONGODB_URI:mongodb://admin:admin@localhost:27017/pigeonSkyRace?authSource=admin}

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: UTC

logging:
  level:
    root: INFO
    com.pigeonskyrace: INFO

server:
  port: ${SERVER_PORT:8082}

# OpenAPI / Swagger UI (enable locally via profile dev or SWAGGER_UI_ENABLED=true)
springdoc:
  api-docs:
    enabled: ${SWAGGER_UI_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}

# JWT: use a strong secret in production (min 32 UTF-8 bytes)
app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-at-least-32-characters-long-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
